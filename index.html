<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0, viewport-fit=cover">
<title>呐~</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: linear-gradient(160deg, #1a0a2e 0%, #2d1b69 25%, #5b2c6f 50%, #b34180 75%, #e8a0bf 100%);
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
  }

  .stars-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
  .star {
    position: absolute; background: white; border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite;
    animation-delay: var(--delay); opacity: 0;
  }
  @keyframes twinkle { 0%,100%{opacity:0;transform:scale(0.3)} 50%{opacity:0.9;transform:scale(1)} }

  .floating-hearts { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
  .float-heart {
    position: absolute; font-size: var(--size);
    animation: floatUp var(--dur) linear infinite;
    animation-delay: var(--delay); left: var(--left); bottom: -40px; opacity: var(--opac);
  }
  @keyframes floatUp {
    0%{transform:translateY(0) rotate(0deg) scale(0.4);opacity:var(--opac)}
    20%{transform:translateY(-18vh) rotate(var(--r1)) scale(0.6)}
    50%{transform:translateY(-48vh) rotate(var(--r2)) scale(0.8);opacity:calc(var(--opac)*0.7)}
    80%{transform:translateY(-78vh) rotate(var(--r3)) scale(0.5)}
    100%{transform:translateY(-105vh) rotate(var(--r4)) scale(0.2);opacity:0}
  }

  .main-container {
    position: relative; z-index: 12;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; padding: 30px 20px; pointer-events: none;
  }
  .title {
    font-size: min(6.5vw, 26px); font-weight: 600;
    color: rgba(255,255,255,0.9);
    text-shadow: 0 0 16px rgba(255,182,193,0.5), 0 2px 4px rgba(0,0,0,0.2);
    letter-spacing: 3px; margin-bottom: 6px; pointer-events: none;
  }
  .subtitle {
    font-size: min(3.8vw, 15px); color: rgba(255,255,255,0.55);
    letter-spacing: 2px; margin-bottom: 30px; pointer-events: none;
  }

  .heart-area { position: relative; pointer-events: none; display: flex; align-items: center; justify-content: center; }
  .heart-svg-wrap {
    width: 200px; height: 200px;
    transition: transform 0.1s ease;
  }
  .heart-svg-wrap.pulse { transform: scale(0.92); }
  .heart-svg { width: 100%; height: 100%; }
  @media (max-width: 480px) {
    .heart-svg-wrap { width: 160px; height: 160px; }
  }

  .glow-ring {
    position: absolute; border-radius: 50%; pointer-events: none;
    animation: glowPulse 2s ease-in-out infinite;
  }
  .glow-ring:nth-child(1) {
    width: 260px; height: 260px;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    box-shadow: 0 0 60px rgba(255,130,160,0.25), 0 0 100px rgba(255,130,160,0.1);
  }
  .glow-ring:nth-child(2) {
    width: 220px; height: 220px;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    animation-delay: 0.6s;
    box-shadow: 0 0 50px rgba(255,150,180,0.2);
  }
  @media (max-width: 480px) {
    .glow-ring:nth-child(1) { width: 210px; height: 210px; }
    .glow-ring:nth-child(2) { width: 180px; height: 180px; }
  }
  @keyframes glowPulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

  .counter-area { margin-top: 32px; display: flex; align-items: center; gap: 8px; pointer-events: none; }
  .counter-label { font-size: min(3.5vw, 14px); color: rgba(255,255,255,0.5); letter-spacing: 1px; }
  .counter-num {
    font-size: min(8vw, 38px); font-weight: 700;
    background: linear-gradient(180deg, #ff8aaf 0%, #ff5c8a 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; filter: drop-shadow(0 0 10px rgba(255,100,140,0.5));
    min-width: 60px; text-align: center;
    transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
  }
  .counter-num.bump { transform: scale(1.25); }

  .hint {
    margin-top: 16px; font-size: min(3.2vw, 13px);
    color: rgba(255,255,255,0.35); letter-spacing: 1px; pointer-events: none;
    animation: hintFade 3s ease-in-out infinite;
  }
  @keyframes hintFade { 0%,100%{opacity:0.3} 50%{opacity:0.7} }

  .online-indicator {
    position: fixed; bottom: 20px; right: 20px; z-index: 30;
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: rgba(255,255,255,0.5);
    pointer-events: none; opacity: 0; transition: opacity 0.6s;
  }
  .online-indicator.show { opacity: 1; }
  .online-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #4fda8a; box-shadow: 0 0 8px rgba(79,218,138,0.7);
    animation: dotPulse 1.5s ease-in-out infinite;
  }
  @keyframes dotPulse { 0%,100%{transform:scale(1);opacity:0.7} 50%{transform:scale(1.6);opacity:1} }

  .sync-toast {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    z-index: 50; pointer-events: none;
    font-size: 12px; color: #fff;
    background: rgba(255,100,140,0.7); padding: 6px 16px; border-radius: 20px;
    opacity: 0; transition: opacity 0.3s; backdrop-filter: blur(6px);
  }
  .sync-toast.flash { opacity: 1; }


  .plus-one {
    position: fixed; pointer-events: none; z-index: 30;
    font-size: 22px; font-weight: 700; color: #ff6b9d;
    text-shadow: 0 0 8px rgba(255,100,140,0.6);
    animation: plusUp 0.9s ease-out forwards; white-space: nowrap;
  }
  @keyframes plusUp {
    0%{opacity:1;transform:translateY(0) scale(0.6)}
    30%{opacity:1;transform:translateY(-30px) scale(1.2)}
    100%{opacity:0;transform:translateY(-80px) scale(0.8)}
  }

  .click-particle {
    position: fixed; pointer-events: none; z-index: 25; border-radius: 50%;
    animation: particleBurst 0.7s ease-out forwards;
  }
  @keyframes particleBurst {
    0%{opacity:1;transform:translate(0,0) scale(1)}
    100%{opacity:0;transform:translate(var(--px),var(--py)) scale(0)}
  }

  .pop-heart {
    position: fixed; pointer-events: none; z-index: 28; font-size: 18px;
    animation: popAway 0.8s ease-out forwards;
  }
  @keyframes popAway {
    0%{opacity:1;transform:translate(0,0) scale(0.4) rotate(0deg)}
    40%{opacity:0.9;transform:translate(var(--dx),var(--dy)) scale(1) rotate(var(--rot))}
    100%{opacity:0;transform:translate(calc(var(--dx)*2.5),calc(var(--dy)*2.5)) scale(0.3) rotate(calc(var(--rot)*2))}
  }

  .remote-ripple {
    position: fixed; pointer-events: none; z-index: 20;
    width: 40px; height: 40px; border-radius: 50%;
    border: 2px solid rgba(255,160,190,0.6);
    animation: rippleOut 1.2s ease-out forwards; transform: translate(-50%,-50%);
  }
  @keyframes rippleOut { 0%{width:10px;height:10px;opacity:0.8} 100%{width:80px;height:80px;opacity:0} }

  .bgm-toggle {
    position: fixed; top: 14px; left: 14px; z-index: 45;
    width: 34px; height: 34px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.08); backdrop-filter: blur(8px);
    color: rgba(255,255,255,0.65); font-size: 15px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.35s;
    user-select: none; -webkit-tap-highlight-color: transparent;
    padding: 0; outline: none; text-decoration: none;
  }
  .bgm-toggle:hover { background: rgba(255,255,255,0.18); color: #fff; border-color: rgba(255,255,255,0.5); }
  .bgm-toggle.playing { color: rgba(255,200,210,0.9); border-color: rgba(255,200,210,0.5); }

  /* 引导遮罩层 */
  .start-overlay {
    position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;
    display:flex;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at center,rgba(20,2,8,0.94),rgba(10,1,4,0.98));
    cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;
    transition:opacity 0.6s,visibility 0.6s;
  }
  .start-overlay.hidden{opacity:0;visibility:hidden;pointer-events:none;}
  .start-overlay-inner{text-align:center;}
  .start-overlay-icon{
    font-size:52px;animation:overlayPulse 2s ease-in-out infinite;margin-bottom:16px;
  }
  @keyframes overlayPulse{0%,100%{transform:scale(1);opacity:0.7}50%{transform:scale(1.15);opacity:1}}
  .start-overlay-text{
    color:rgba(255,255,255,0.85);font-size:18px;letter-spacing:3px;font-weight:300;
  }
  .start-overlay-sub{
    color:rgba(255,255,255,0.4);font-size:13px;margin-top:10px;letter-spacing:1px;
  }

  /* 首次打开每日问候 */
  .daily-message {
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    z-index:99;pointer-events:none;
    font-size:1.8rem;font-weight:500;color:#ff85ab;
    text-shadow:0 0 20px rgba(255,96,136,0.35),0 2px 8px rgba(0,0,0,0.15);
    letter-spacing:0.12em;white-space:nowrap;
    opacity:0;transition:opacity 1s ease;
  }
  .daily-message.show{opacity:1;}

  /* 加载指示器 */
  .loading-indicator {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    z-index: 200; pointer-events: none;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
    transition: opacity 0.4s ease;
  }
  .loading-indicator.done { opacity: 0; pointer-events: none; }
  .loading-spinner {
    width: 32px; height: 32px;
    border: 2px solid rgba(255,150,180,0.25);
    border-top-color: rgba(255,120,160,0.8);
    border-radius: 50%;
    animation: spinAnim 0.8s linear infinite;
  }
  @keyframes spinAnim { to { transform: rotate(360deg); } }
  .loading-text { color: rgba(255,180,200,0.7); font-size: 13px; letter-spacing: 2px; }
</style>
</head>
<body>

<div class="loading-indicator" id="loadingIndicator">
  <div class="loading-spinner"></div>
  <div class="loading-text">正在准备惊喜</div>
</div>


<div class="start-overlay" id="startOverlay">
  <div class="start-overlay-inner">
    <div class="start-overlay-icon">💗</div>
    <div class="start-overlay-text">轻触开始</div>
    <div class="start-overlay-sub">点击任意位置</div>
  </div>
</div>

<div class="daily-message" id="dailyMessage">又是爱你的一天</div>

<button class="bgm-toggle" id="bgmToggle" title="王菲 - 传奇">♪</button>
<audio id="bgmAudio" preload="auto" loop></audio>

<div class="stars-container" id="starsContainer"></div>
<div class="floating-hearts" id="floatingHearts"></div>

<div id="clickZone" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; cursor: pointer;"></div>

<div class="main-container">
  <div class="title">悄悄给你攒的</div>
  <div class="subtitle">每一下 都是在想你</div>
  <div class="heart-area" style="position: relative;">
    <div class="glow-ring"></div>
    <div class="glow-ring"></div>
    <div class="heart-svg-wrap" id="heartSvgWrap">
      <svg class="heart-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 84 C22 60, 2 47, 2 29 C2 15, 14 5, 28 5 C36 5, 44 9, 50 15 C56 9, 64 5, 72 5 C86 5, 98 15, 98 29 C98 47, 78 60, 50 84Z" fill="#e8436e" stroke="rgba(255,255,255,0.25)" stroke-width="0.4"/>
        <ellipse cx="34" cy="21" rx="7" ry="4.5" fill="rgba(255,255,255,0.22)" transform="rotate(-28 34 21)"/>
      </svg>
    </div>
  </div>
  <div class="counter-area">
    <span class="counter-label">已悄悄攒了</span>
    <span class="counter-num" id="counterNum">0</span>
    <span class="counter-label">颗</span>
  </div>
  <div class="hint" id="hintText">点一点屏幕试试</div>

</div>

<div class="online-indicator" id="onlineIndicator">
  <span class="online-dot"></span>对方也在看哦
</div>
<div class="sync-toast" id="syncToast"></div>

<script>
(function() {
  // ==================== 基础变量 ====================
  const counterNum = document.getElementById('counterNum');
  const clickZone = document.getElementById('clickZone');
  const heartSvgWrap = document.getElementById('heartSvgWrap');
  const floatingContainer = document.getElementById('floatingHearts');
  const onlineIndicator = document.getElementById('onlineIndicator');
  const syncToast = document.getElementById('syncToast');
  const starsContainer = document.getElementById('starsContainer');
  const hintText = document.getElementById('hintText');

  let count = 0;
  let lastClickTime = 0;
  const THROTTLE_MS = 280;

  // ==================== Supabase 同步 (原生 fetch, 无外部依赖) ====================
  var SUPABASE_URL = 'https://mssxvglyvwnonljtxupa.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_ruyCN2ByPw5uzd_fzxMqfQ_a-U97j2a';
  var supabaseReady = true;  // 无需等待 SDK, fetch 始终可用

  function supabaseFetch(path, options) {
    options = options || {};
    options.headers = options.headers || {};
    options.headers['apikey'] = SUPABASE_KEY;
    options.headers['Authorization'] = 'Bearer ' + SUPABASE_KEY;
    if (!options.headers['Content-Type'] && (options.method === 'POST' || options.method === 'PATCH')) {
      options.headers['Content-Type'] = 'application/json';
    }
    return fetch(SUPABASE_URL + path, options).then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      var ct = r.headers.get('content-type') || '';
      return ct.indexOf('application/json') >= 0 ? r.json() : r.text();
    });
  }

  function syncToSupabase(nc) {
    supabaseFetch('/rest/v1/heart_counts', {
      method: 'POST',
      headers: { 'Prefer': 'resolution=merge-duplicates' },
      body: JSON.stringify({ id: 1, count: nc, updated_at: new Date().toISOString() })
    }).catch(function() {});
  }

  function getServerCount() {
    return supabaseFetch('/rest/v1/heart_counts?id=eq.1&select=count,updated_at').then(function(data) {
      if (data && data.length > 0) return data[0];
      return null;
    }).catch(function() { return null; });
  }

  // 初始化：从服务端加载计数
  getServerCount().then(function(row) {
    if (row && row.count !== null) {
      var today = getChinaDate();
      var serverDate = null;
      if (row.updated_at) {
        var d = new Date(row.updated_at);
        serverDate = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      }
      if (serverDate && serverDate !== today) {
        setCount(0);
        try { localStorage.setItem('__heart_count', '0'); localStorage.setItem('__heart_date', today); } catch(e) {}
        syncToSupabase(0);
      } else if (row.count > count) {
        setCount(row.count);
        try { localStorage.setItem('__heart_count', row.count); } catch(e) {}
      }
    }
  });

  function getChinaDate() {
    var now = new Date();
    var utc = now.getTime() + (now.getTimezoneOffset() * 60000);
    var china = new Date(utc + (8 * 3600000));
    var y = china.getFullYear();
    var m = china.getMonth() + 1;
    var d = china.getDate();
    return y + '-' + (m < 10 ? '0' : '') + m + '-' + (d < 10 ? '0' : '') + d;
  }

  function checkDailyReset() {
    var today = getChinaDate();
    var savedDate = null;
    try { savedDate = localStorage.getItem('__heart_date'); } catch(e) {}
    if (savedDate !== today) {
      try { localStorage.setItem('__heart_count', '0'); } catch(e) {}
      try { localStorage.setItem('__heart_date', today); } catch(e) {}
      return true;
    }
    return false;
  }

  // 轮询兜底：每 5 秒从服务端拉取，检测对方点击
  var pollTimer = setInterval(function() {
    getServerCount().then(function(row) {
      if (row && row.count !== null && row.count > count) {
        var today = getChinaDate();
        var serverDate = null;
        if (row.updated_at) {
          var d = new Date(row.updated_at);
          serverDate = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
        }
        if (serverDate && serverDate !== today) return;
        setCount(row.count);
        try { localStorage.setItem('__heart_count', row.count); } catch(e) {}
        showOnlineIndicator();
        flashToast('对方刚刚点了一下~');
      }
    }).catch(function() {});
  }, 5000);

  // ==================== 背景星光 ====================
  for (let i = 0; i < 70; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 2.5 + 1;
    star.style.cssText = 'width:'+size+'px;height:'+size+'px;top:'+(Math.random()*100)+'%;left:'+(Math.random()*100)+'%;--dur:'+(Math.random()*3+2.5)+'s;--delay:'+(Math.random()*5)+'s';
    starsContainer.appendChild(star);
  }

  // ==================== 飘落爱心 ====================
  const heartEmojis = ['💕','💖','💗','💝','🩷','🌸','✨','💫','🫧','🕊️'];
  function createFloatingHeart() {
    const el = document.createElement('span');
    el.className = 'float-heart';
    const size = Math.random()*16+14;
    const opac = (Math.random()*0.35+0.20).toFixed(2);
    el.style.cssText = '--size:'+size+'px;--dur:'+(Math.random()*7+6)+'s;--delay:'+(Math.random()*3)+'s;--left:'+(Math.random()*88+6)+'%;--opac:'+opac+';--r1:'+(Math.random()*30-15)+'deg;--r2:'+(Math.random()*50-25)+'deg;--r3:'+(Math.random()*70-35)+'deg;--r4:'+(Math.random()*100-50)+'deg';
    el.textContent = heartEmojis[Math.floor(Math.random()*heartEmojis.length)];
    floatingContainer.appendChild(el);
    var dur = parseFloat(el.style.getPropertyValue('--dur'))*1000+3000;
    setTimeout(function(){el.remove();},dur);
  }
  for(var i=0;i<10;i++){setTimeout(function(){createFloatingHeart();},i*350);}
  setInterval(createFloatingHeart,900);

  // ==================== 预合成心跳音效（咚-咚，音量加强） ====================
  var audioCtx = null;
  var chimeBuffer = null;
  function getAudioCtx() {
    if(!audioCtx){audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
    if(audioCtx.state==='suspended'){audioCtx.resume();}
    return audioCtx;
  }
  function buildChimeBuffer(){
    var sr=44100;var dur=0.45;var off=new OfflineAudioContext(1,Math.floor(sr*dur),sr);
    var master=off.createGain();master.connect(off.destination);
    // 心跳：低频正弦 + 二次谐波，模拟 "咚" 感
    function addPulse(startTime, freq, amp) {
      var o1=off.createOscillator();o1.type='sine';o1.frequency.setValueAtTime(freq,startTime);
      var o2=off.createOscillator();o2.type='sine';o2.frequency.setValueAtTime(freq*1.5,startTime);
      var g=off.createGain();
      g.gain.setValueAtTime(0.01,startTime);
      g.gain.exponentialRampToValueAtTime(amp,startTime+0.015);
      g.gain.exponentialRampToValueAtTime(0.001,startTime+0.18);
      o1.connect(g);o2.connect(g);g.connect(master);
      o1.start(startTime);o1.stop(startTime+0.2);
      o2.start(startTime);o2.stop(startTime+0.2);
    }
    addPulse(0,    55, 1.2);   // 第一跳 "咚"
    addPulse(0.18, 52, 0.95);  // 第二跳 "咚" 稍轻
    return off.startRendering();
  }
  buildChimeBuffer().then(function(b){chimeBuffer=b;}).catch(function(){});
  function playChime(){
    try{var ctx=getAudioCtx();if(!chimeBuffer)return;var s=ctx.createBufferSource();s.buffer=chimeBuffer;var v=ctx.createGain();v.gain.setValueAtTime(6.0,ctx.currentTime);s.connect(v);v.connect(ctx.destination);s.start(0);}catch(e){}
  }

  // ==================== 背景音乐：王菲 - 传奇（HTML5 Audio 自动播放） ====================
  var bgmToggle = document.getElementById('bgmToggle');
  var bgmAudio = document.getElementById('bgmAudio');
  var BGM_URL = 'https://music.163.com/song/media/outer/url?id=298838.mp3';
  var bgmPlaying = false;

  function startBgm() {
    if (!bgmAudio.src) {
      bgmAudio.src = BGM_URL;
      bgmAudio.load();
    }
    bgmAudio.play().then(function() {
      bgmPlaying = true;
      bgmToggle.classList.add('playing');
    }).catch(function() {
      // 静默处理自动播放被拦截的情况
    });
  }

  function toggleBgm() {
    if (!bgmAudio.src) {
      bgmAudio.src = BGM_URL;
      bgmAudio.load();
    }
    if (bgmAudio.paused) {
      bgmAudio.play().then(function() {
        bgmPlaying = true;
        bgmToggle.classList.add('playing');
      }).catch(function(){});
    } else {
      bgmAudio.pause();
      bgmPlaying = false;
      bgmToggle.classList.remove('playing');
    }
  }

  bgmAudio.addEventListener('play', function() {
    bgmPlaying = true;
    bgmToggle.classList.add('playing');
  });
  bgmAudio.addEventListener('pause', function() {
    bgmPlaying = false;
    bgmToggle.classList.remove('playing');
  });
  bgmAudio.addEventListener('ended', function() {
    bgmPlaying = false;
    bgmToggle.classList.remove('playing');
  });

  bgmToggle.addEventListener('click', function(e) {
    e.preventDefault();
    e.stopPropagation();
    toggleBgm();
  });

  // 引导层：微信音频激活（五重策略叠加）
  var startOverlayEl = document.getElementById('startOverlay');
  var audioActivated = false;
  var audioWarmer = null;

  // 生成极短无声 WAV（0.1 秒），用于音频预热解锁
  function createSilentWavUrl() {
    var sr = 44100, ch = 1, bps = 16, sec = 0.1;
    var byteRate = sr * ch * bps / 8;
    var dataSize = Math.floor(sr * sec) * ch * bps / 8;
    var buf = new ArrayBuffer(44 + dataSize);
    var v = new DataView(buf);
    function ws(off, s) { for (var i = 0; i < s.length; i++) v.setUint8(off + i, s.charCodeAt(i)); }
    ws(0, 'RIFF'); v.setUint32(4, 36 + dataSize, true); ws(8, 'WAVE');
    ws(12, 'fmt '); v.setUint32(16, 16, true); v.setUint16(20, 1, true);
    v.setUint16(22, ch, true); v.setUint32(24, sr, true); v.setUint32(28, byteRate, true);
    v.setUint16(32, ch * bps / 8, true); v.setUint16(34, bps, true);
    ws(36, 'data'); v.setUint32(40, dataSize, true);
    return URL.createObjectURL(new Blob([buf], {type: 'audio/wav'}));
  }

  function warmUpAudio() {
    if (audioActivated) return;
    // 策略1: 激活/恢复 AudioContext
    var ctx = getAudioCtx();

    // 策略4: 发一声极短无声 oscillator 脉冲确认 AudioContext 就绪
    try {
      var osc = ctx.createOscillator();
      var gn = ctx.createGain();
      gn.gain.value = 0.001;
      osc.connect(gn); gn.connect(ctx.destination);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.01);
    } catch(e) {}
    // 策略3: 隐藏音频预热器 — 播放极短静音片段解锁系统音频
    try {
      if (!audioWarmer) {
        audioWarmer = new Audio();
        audioWarmer.src = createSilentWavUrl();
        audioWarmer.load();
      }
      audioWarmer.play().then(function() {
        audioWarmer.pause();
        audioWarmer.currentTime = 0;
      }).catch(function(){});
    } catch(e) {}
    audioActivated = true;
  }

  // 策略2: WeixinJSBridgeReady — 微信专属事件，桥就绪后即刻预热
  try {
    document.addEventListener('WeixinJSBridgeReady', function() {
      warmUpAudio();
    });
    if (typeof window.WeixinJSBridge !== 'undefined' && window.WeixinJSBridge) {
      warmUpAudio();
    }
  } catch(e) {}

  var dailyMessageShown = false;
  function showDailyMessage() {
    if (dailyMessageShown) return;
    dailyMessageShown = true;
    var visited = null;
    try { visited = localStorage.getItem('__heart_visited'); } catch(e) {}
    if (!visited) {
      try { localStorage.setItem('__heart_visited', '1'); } catch(e) {}
      var el = document.getElementById('dailyMessage');
      if (el) {
        el.classList.add('show');
        setTimeout(function() { el.classList.remove('show'); }, 2500);
      }
    }
  }

  function dismissOverlay(e) {
    if (!startOverlayEl || startOverlayEl.classList.contains('hidden')) return;
    try { warmUpAudio(); } catch(err) {}
    startOverlayEl.classList.add('hidden');
    showDailyMessage();
    startBgm();

    // 首次点击也计入计数
    if (e) {
      var cx, cy;
      if (e.touches && e.touches[0]) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
      else if (e.changedTouches && e.changedTouches[0]) { cx = e.changedTouches[0].clientX; cy = e.changedTouches[0].clientY; }
      else { cx = e.clientX; cy = e.clientY; }
      handleClick(cx, cy);
    }
  }

  // ==================== 微信兼容：统一 document 事件委托 ====================
  // touchstart 和 click 双通道独立触发，不互斥；handleClick 内部 280ms 节流防连击
  document.addEventListener('touchstart', function(e) {
    if (e.target.closest('#bgmToggle')) return;
    e.preventDefault();
    if (startOverlayEl && !startOverlayEl.classList.contains('hidden')) {
      dismissOverlay(e);
      return;
    }
    var t = e.touches[0];
    handleClick(t.clientX, t.clientY);
  }, {passive: false});

  document.addEventListener('click', function(e) {
    if (e.target.closest('#bgmToggle')) return;
    if (startOverlayEl && !startOverlayEl.classList.contains('hidden')) {
      dismissOverlay(e);
      return;
    }
    handleClick(e.clientX, e.clientY);
  });

  // ==================== 文本动画 ====================
  const particleColors = ['#ff6088','#ff85ab','#ffb3c6','#ffe0e8','#fff','#ff457a','#ff9eb5','#ffccd5'];
  const popHearts = ['❤️','💕','💖','💗','💘','🌸'];

  function spawnPlusOne(x,y){var e=document.createElement('div');e.className='plus-one';e.textContent='+1';e.style.left=x+'px';e.style.top=y+'px';document.body.appendChild(e);setTimeout(function(){e.remove();},950);}
  function spawnParticles(x,y){for(var i=0;i<12;i++){var p=document.createElement('div');p.className='click-particle';var a=(Math.PI*2*i)/12+Math.random()*0.4;var d=Math.random()*40+18;p.style.cssText='left:'+x+'px;top:'+y+'px;width:'+(Math.random()*5+3)+'px;height:'+(Math.random()*5+3)+'px;background:'+particleColors[Math.floor(Math.random()*particleColors.length)]+';--px:'+(Math.cos(a)*d)+'px;--py:'+(Math.sin(a)*d)+'px';document.body.appendChild(p);setTimeout(function(){p.remove();},750);}}
  function spawnPopHeart(x,y){var e=document.createElement('div');e.className='pop-heart';e.textContent=popHearts[Math.floor(Math.random()*popHearts.length)];var a=Math.random()*Math.PI*2;var d=Math.random()*40+30;e.style.cssText='left:'+x+'px;top:'+y+'px;--dx:'+(Math.cos(a)*d)+'px;--dy:'+(-40-Math.random()*30)+'px;--rot:'+(Math.random()*60-30)+'deg';document.body.appendChild(e);setTimeout(function(){e.remove();},850);}
  function spawnClickFloating(cx){for(var i=0;i<3;i++){var e=document.createElement('span');e.className='float-heart';var s=Math.random()*14+16;var o=(Math.random()*0.4+0.3).toFixed(2);e.style.cssText='--size:'+s+'px;--dur:'+(Math.random()*5+4)+'s;--delay:0s;--left:'+(cx/window.innerWidth*80+Math.random()*10-5)+'%;--opac:'+o+';--r1:'+(Math.random()*40-20)+'deg;--r2:'+(Math.random()*60-30)+'deg;--r3:'+(Math.random()*80-40)+'deg;--r4:'+(Math.random()*120-60)+'deg';e.textContent=heartEmojis[Math.floor(Math.random()*heartEmojis.length)];floatingContainer.appendChild(e);setTimeout(function(){e.remove();},9000);}}

  function bumpCounter(){counterNum.classList.remove('bump');void counterNum.offsetWidth;counterNum.classList.add('bump');setTimeout(function(){counterNum.classList.remove('bump');},200);}
  function setCount(nc){count=nc;counterNum.textContent=count;bumpCounter();}

  // ==================== 核心点击处理 ====================
  function handleClick(clientX, clientY) {
    var now = Date.now();
    if(now-lastClickTime<THROTTLE_MS)return;
    lastClickTime=now;

    var newCount=count+1;
    setCount(newCount);
    try{localStorage.setItem('__heart_count',newCount);}catch(e){}
    broadcast({type:'count',count:newCount,x:clientX,y:clientY});
    syncToSupabase(newCount);

    spawnPlusOne(clientX-15,clientY-20);
    spawnParticles(clientX,clientY);
    if(Math.random()<0.5){spawnPopHeart(clientX,clientY);}
    spawnClickFloating(clientX);

    heartSvgWrap.classList.add('pulse');
    setTimeout(function(){heartSvgWrap.classList.remove('pulse');},120);

    try { playChime(); } catch(e) {}
    try { navigator.vibrate(30); } catch(e) {}
  }

  // ==================== 跨标签页同步 ====================
  var channel=null;var peerConnected=false;
  function broadcast(d){if(channel){try{channel.postMessage(d);}catch(e){}}}
  function showOnlineIndicator(){if(!peerConnected){peerConnected=true;onlineIndicator.classList.add('show');}}
  function flashToast(m){syncToast.textContent=m;syncToast.classList.add('flash');setTimeout(function(){syncToast.classList.remove('flash');},2000);}
  function showRemoteRipple(x,y){var r=document.createElement('div');r.className='remote-ripple';r.style.left=x+'px';r.style.top=y+'px';document.body.appendChild(r);setTimeout(function(){r.remove();},1300);}
  function onRemoteUpdate(d){if(d.count!==undefined&&d.count>count){setCount(d.count);try{localStorage.setItem('__heart_count',d.count);}catch(e){}if(d.x!==undefined&&d.y!==undefined){showRemoteRipple(d.x,d.y);}flashToast('对方刚刚点了一下~');}}
  try{channel=new BroadcastChannel('heart_sync');channel.onmessage=function(e){showOnlineIndicator();if(e.data&&e.data.type==='count'){onRemoteUpdate(e.data);}else if(e.data&&e.data.type==='ping'){showOnlineIndicator();broadcast({type:'pong'});}};broadcast({type:'ping'});}catch(e){channel=null;}
  window.addEventListener('storage',function(e){if(e.key==='__heart_count'&&e.newValue){var rc=parseInt(e.newValue,10);if(rc>count){setCount(rc);showOnlineIndicator();flashToast('对方刚刚点了一下~');}}if(e.key==='__heart_ping'){showOnlineIndicator();try{localStorage.setItem('__heart_pong',Date.now().toString());}catch(ex){}}});
  setInterval(function(){try{localStorage.setItem('__heart_ping',Date.now().toString());}catch(e){}try{var p=localStorage.getItem('__heart_pong');if(p&&Date.now()-parseInt(p,10)<5000){showOnlineIndicator();}}catch(e){}if(channel){broadcast({type:'ping'});}},3000);

  // ==================== 初始化计数 ====================
  checkDailyReset();
  try{var saved=localStorage.getItem('__heart_count');if(saved){setCount(parseInt(saved,10)||0);}}catch(e){}


  // 背景音乐：点击 ♪ 按钮在当前页面弹出 QQ音乐播放器（王菲 - 传奇）

  // 隐藏加载指示器
  var loadEl = document.getElementById('loadingIndicator');
  if (loadEl) {
    setTimeout(function() { loadEl.classList.add('done'); }, 400);
    setTimeout(function() { if (loadEl.parentNode) loadEl.parentNode.removeChild(loadEl); }, 1200);
  }

})();
</script>
</body>
</html>
